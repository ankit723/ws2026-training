<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading Animation</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 200px;
            height: 200px;
            position: relative;
        }

        .bar {
            width: 200px;
            height: 20px;
            background: black;
            position: absolute;
        }

        .bar1 {
            top: 11%;
            left: 0;
            transform-origin: right center;
            animation: spinHorizontal 6s infinite ease-in-out;
        }

        .bar2 {
            bottom: 0%;
            left: 160px;
            transform: rotate(270deg);
            transform-origin: left center;
            animation: spinVertical 6s infinite ease-in-out;
            animation-delay: 0.2s;
        }

        .bar3 {
            bottom: 20%;
            right: 0;
            transform-origin: left center;
            animation: spinHorizontalReverse 6s infinite ease-in-out;
            animation-delay: 0.4s;
        }

        .bar4 {
            top: -9%;
            right: 160px;
            transform: rotate(270deg);
            transform-origin: right center;
            animation: spinVertical 6s infinite ease-in-out;
            animation-delay: 0.2s;
        }

        /* TOP BAR */
        @keyframes spinHorizontal {
            0% {
                transform: rotate(0deg);
            }

            20% {
                transform: rotate(360deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* RIGHT BAR */
        @keyframes spinVertical {
            0% {
                transform: rotate(270deg);
            }

            20% {
                transform: rotate(630deg);
            }

            100% {
                transform: rotate(630deg);
            }
        }

        /* BOTTOM BAR */
        @keyframes spinHorizontalReverse {
            0% {
                transform: rotate(0deg);
            }

            20% {
                transform: rotate(-360deg);
            }

            100% {
                transform: rotate(-360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="bar bar1"></div>
        <div class="bar bar2"></div>
        <div class="bar bar3"></div>
        <div class="bar bar4"></div>
    </div>
</body>

</html>
